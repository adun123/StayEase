<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Reservasi</title><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{layout :: shell(~{::section})}"><section>
<h1>Reservasi</h1><div class="card"><h2>Buat Reservasi</h2><form class="form" method="post" action="/reservasi/add"><select name="idTamu"><option th:each="t:${daftarTamu}" th:value="${t.idTamu}" th:text="${t.idTamu + ' - ' + t.nama}"></option></select><select name="nomorKamar"><option th:each="k:${daftarKamar}" th:value="${k.nomorKamar}" th:text="${k.nomorKamar + ' - ' + k.tipeKamar}"></option></select><input name="tanggalCheckIn" type="date" required><input name="tanggalCheckOut" type="date" required><button class="btn">Booking</button></form></div>
<div class="card"><h2>Daftar Reservasi</h2><table><tr><th>ID</th><th>Tamu</th><th>Kamar</th><th>Tanggal</th><th>Durasi</th><th>Total</th><th>Status</th><th>Aksi</th></tr><tr th:each="r:${daftarReservasi}"><td th:text="${r.idReservasi}"></td><td th:text="${r.tamu.nama}"></td><td th:text="${r.kamar.nomorKamar + ' (' + r.kamar.tipeKamar + ')'}"></td><td th:text="${r.tanggalCheckIn + ' s/d ' + r.tanggalCheckOut}"></td><td th:text="${r.durasiMenginap + ' malam'}"></td><td th:text="${#numbers.formatDecimal(r.totalBiaya,0,'COMMA',0,'POINT')}"></td><td><span class="badge" th:text="${r.statusReservasi}"></span></td><td><form th:if="${r.statusReservasi.name() == 'DIBOOKING'}" method="post" action="/reservasi/batal"><input type="hidden" name="idReservasi" th:value="${r.idReservasi}"><button class="btn warn">Batal</button></form></td></tr></table></div>
</section></div></body></html>
