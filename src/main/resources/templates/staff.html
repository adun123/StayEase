<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Staff</title><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{layout :: shell(~{::section})}"><section>
<h1>Manajemen Staff dan Hak Akses</h1><div class="card"><h2>Tambah Staff</h2><form class="form" method="post" action="/staff/add"><input name="nama" placeholder="Nama" required><input name="username" placeholder="Username" required><input name="email" type="email" placeholder="Email" required><input name="password" placeholder="Password" required><select name="roleName"><option>ADMIN</option><option>RESEPSIONIS</option><option>HOUSEKEEPING</option></select><button class="btn">Tambah</button></form></div>
<div class="card"><h2>Daftar Staff</h2><table><tr><th>ID</th><th>Nama</th><th>Username</th><th>Email</th><th>Jabatan</th><th>Role</th><th>Aksi</th></tr><tr th:each="s:${daftarStaff}"><td th:text="${s.idUser}"></td><td th:text="${s.nama}"></td><td th:text="${s.username}"></td><td th:text="${s.email}"></td><td th:text="${s.jabatan}"></td><td th:text="${s.role.namaRole}"></td><td><form method="post" action="/staff/delete"><input type="hidden" name="idUser" th:value="${s.idUser}"><button class="btn warn">Hapus</button></form></td></tr></table></div>
</section></div></body></html>
