<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Kamar</title><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{layout :: shell(~{::section})}"><section>
<h1 th:text="${canRoomManage} ? 'Manajemen Kamar' : 'Data Kamar'">Manajemen Kamar</h1>
<div class="card" th:if="${canRoomManage}"><h2>Tambah Kamar</h2><form class="form" method="post" action="/kamar/add"><input name="nomorKamar" placeholder="Nomor kamar" required><select name="tipeKamar"><option>STANDARD</option><option>VIP</option></select><input name="hargaKamar" type="number" placeholder="Harga kamar" required><input name="biayaTambahan" type="number" placeholder="Biaya tambahan VIP"><button class="btn">Tambah</button></form></div>
<div class="card"><h2>Daftar Kamar</h2><p class="hint" th:if="${canHousekeeping and !canRoomManage}">Role Housekeeping hanya dapat memperbarui status kamar, misalnya DIBERSIHKAN, TERSEDIA, atau MAINTENANCE.</p><p class="hint" th:if="${!canHousekeeping and !canRoomManage}">Role Resepsionis hanya dapat melihat data kamar untuk kebutuhan reservasi.</p><table><tr><th>No</th><th>Tipe</th><th>Harga</th><th>Status</th><th th:if="${canRoomManage or canHousekeeping}">Aksi</th></tr><tr th:each="k:${daftarKamar}"><td th:text="${k.nomorKamar}"></td><td th:text="${k.tipeKamar}"></td><td th:text="${#numbers.formatDecimal(k.hargaKamar,0,'COMMA',0,'POINT')}"></td><td><span class="badge" th:text="${k.statusKamar}"></span></td><td th:if="${canRoomManage or canHousekeeping}"><form class="actions" method="post" action="/kamar/status"><input type="hidden" name="nomorKamar" th:value="${k.nomorKamar}"><select name="statusKamar"><option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option></select><button class="btn gray">Update</button></form></td></tr></table></div>
</section></div></body></html>
